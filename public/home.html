<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nataly Ribeiro</title>
  <meta name="description" content="Nataly Ribeiro — Lash Designer. Beleza atemporal, feita com calma.">
  <meta property="og:title" content="Nataly Ribeiro">
  <meta property="og:type" content="website">
  <script src="/js/pixel.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital@1&family=Hanken+Grotesk:wght@400;600&family=Playfair+Display:ital,wght@1,500&display=swap" rel="stylesheet">
  <style>
    :root{ --pretinho:#241C15; --creme:#F2EEE5; --argila:#C9A48B; --salvia:#7E9072; }
    *{margin:0;box-sizing:border-box}
    body{
      background:var(--pretinho); color:var(--creme);
      font-family:'Hanken Grotesk',sans-serif;
      min-height:100vh; min-height:100svh;
      display:flex; align-items:center; justify-content:center;
      text-align:center; padding:32px;
    }
    .wrap{ max-width:560px }
    .eyebrow{ font-size:12px; letter-spacing:.28em; text-transform:uppercase; font-weight:600; color:var(--argila); display:inline-flex; align-items:center; gap:.7em }
    .eyebrow::before{ content:""; width:6px;height:6px;border-radius:50%;background:var(--salvia);display:inline-block }
    h1{ font-family:'Playfair Display',serif; font-style:italic; font-weight:500; font-size:clamp(46px,12vw,92px); line-height:1.04; margin:20px 0 0; letter-spacing:-.01em }
    .apoio{ font-family:'Cormorant Garamond',serif; font-style:italic; font-size:clamp(20px,3vw,27px); color:rgba(242,238,229,.72); margin-top:14px }
    .filete{ width:60px;height:1px;background:rgba(242,238,229,.25);margin:34px auto }
    .link{ display:inline-flex; align-items:center; gap:.5em; color:var(--argila); text-decoration:none; font-weight:600; font-size:15px; border:1px solid rgba(242,238,229,.25); border-radius:100px; padding:13px 26px; transition:.25s }
    .link:hover{ border-color:var(--argila); transform:translateY(-2px) }
    .rodape{ margin-top:46px; font-size:12px; color:rgba(242,238,229,.4); letter-spacing:.02em }
  </style>
</head>
<body>
  <div class="wrap">
    <span class="eyebrow">Lash Designer</span>
    <h1>Nataly <span style="color:var(--argila)">Ribeiro</span></h1>
    <p class="apoio">Beleza atemporal, feita com calma.</p>
    <div class="filete"></div>
    <a class="link" href="/lash-grupo-vip">Conheça o Lash 2.0 &rarr;</a>
    <p class="rodape">© 2026 Nataly Ribeiro · site em construção</p>
  </div>
</body>
</html>
